<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apex Motors | Premium Sportbikes</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&family=Roboto:wght@300;400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- CABECERA -->
    <header class="navbar">
        <div class="logo">
            <span class="logo-icon">🏍️</span> APEX<span class="logo-accent">MOTORS</span>
        </div>
        <div class="cart-trigger" aria-expanded="false" aria-label="Abrir carrito">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path></svg>
            <span id="cart-count" class="cart-badge" aria-label="0 motos en el carrito">0</span>
        </div>
    </header>

    <!-- HERO SECTION (Banner Visual) -->
    <section class="hero">
        <div class="hero-content">
            <h1>Domina la pista.</h1>
            <p>Encuentra las mejores superbikes del mercado listas para agregar a tu garaje virtual.</p>
        </div>
    </section>

    <!-- BANNER DE OFERTA CON CONTADOR REGRESIVO -->
    <div class="oferta-banner">
        <div class="oferta-content">
            <span class="oferta-label">🔥 Oferta de temporada — termina en:</span>
            <div class="countdown-timer">
                <div class="time-block">
                    <span id="countdown-dias">00</span>
                    <small>días</small>
                </div>
                <span class="separator">:</span>
                <div class="time-block">
                    <span id="countdown-horas">00</span>
                    <small>hrs</small>
                </div>
                <span class="separator">:</span>
                <div class="time-block">
                    <span id="countdown-minutos">00</span>
                    <small>min</small>
                </div>
                <span class="separator">:</span>
                <div class="time-block">
                    <span id="countdown-segundos">00</span>
                    <small>seg</small>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
